    depends_on:
      - ref('gold_sales_by_day')
      - ref('gold_sales_by_store')
      - ref('gold_sales_by_product')
    owner:
      name: Muhammed John
      email: muhammedjohn3@gmail.com

  - name: store_performance_report
    type: dashboard
