version: 2

models:
  - name: gold_sales_by_day
    description: Daily sales aggregates — revenue, orders, units, discounts per date
    config:
      materialized: table
      schema: gold
    columns:
      - name: date_sk
        description: Primary key — one row per day
        tests:
          - unique
          - not_null
      - name: total_net_revenue
        tests:
          - not_null
      - name: total_orders
        tests:
          - not_null

  - name: gold_sales_by_product
    description: Product performance — revenue, units sold, discount rate per product
    config:
      materialized: table
      schema: gold
    columns:
      - name: product_sk
        description: Primary key — one row per product
        tests:
          - unique
          - not_null
      - name: total_net_revenue
        tests:
          - not_null
      - name: total_units_sold
        tests:
          - not_null

  - name: gold_sales_by_store
    description: Store performance — revenue, unique customers, revenue per customer per store
    config:
      materialized: table
      schema: gold
    columns:
      - name: store_sk
        description: Primary key — one row per store
        tests:
          - unique
          - not_null
      - name: total_net_revenue
        tests:
          - not_null
      - name: unique_customers
        tests:
          - not_null

  - name: gold_customer_summary
    description: Customer lifetime metrics — LTV, order frequency, discount rate per customer
    config:
      materialized: table
      schema: gold
    columns:
      - name: customer_sk
        description: Primary key — one row per customer
        tests:
          - unique
          - not_null
      - name: lifetime_value
        tests:
          - not_null
      - name: total_orders
        tests:
          - not_null
